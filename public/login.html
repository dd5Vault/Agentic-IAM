<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Agentic IAM v3.0 — Login</title>
<style>
:root{--p:#4C1D95;--pm:#7C3AED;--pl:#EDE9FE;--r:#DC2626;--g:#059669;--text:#0F172A;--muted:#64748B;--border:#E2E8F0;--shadow:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);--shadow-lg:0 8px 24px rgba(0,0,0,0.1);--radius:12px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',sans-serif;background:linear-gradient(135deg,#1E1B2E 0%,#2D2640 50%,#4C1D95 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:white;border-radius:20px;padding:40px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.logo{text-align:center;margin-bottom:30px}
.logo-icon{width:64px;height:64px;background:linear-gradient(135deg,#7C3AED,#6D28D9);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 12px;box-shadow:0 4px 16px rgba(124,58,237,0.4)}
.logo h1{font-size:20px;color:var(--text);font-weight:700}
.logo p{font-size:12px;color:var(--muted);margin-top:4px}
.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:12px;font-weight:600;color:var(--text);margin-bottom:6px}
.form-group input{width:100%;padding:12px 16px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;transition:all .2s;background:#F8FAFC;font-family:inherit}
.form-group input:focus{outline:none;border-color:var(--pm);box-shadow:0 0 0 3px rgba(124,58,237,.1);background:white}
.login-btn{width:100%;padding:14px;background:linear-gradient(135deg,#7C3AED,#6D28D9);color:white;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;box-shadow:0 4px 12px rgba(124,58,237,0.3);margin-top:6px}
.login-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,58,237,0.4)}
.login-btn:disabled{background:#CBD5E1;cursor:not-allowed;transform:none;box-shadow:none}
.error-msg{background:#FEE2E2;color:var(--r);padding:10px 14px;border-radius:8px;font-size:12px;margin-bottom:16px;display:none;border:1px solid #FECACA}
.demo-hint{margin-top:24px;padding:16px;background:#F8FAFC;border-radius:12px;border:1px solid var(--border)}
.demo-hint h3{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.demo-user{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px}
.demo-user:last-child{border-bottom:none}
.demo-user-name{font-weight:600;color:var(--text)}
.demo-user-role{font-size:10px;padding:2px 8px;border-radius:6px;font-weight:600}
.role-admin{background:var(--pl);color:var(--pm)}
.role-operatore{background:#D1FAE5;color:#059669}
.role-auditor{background:#FEF3C7;color:#92400E}
.demo-fill{background:none;border:1px solid var(--border);border-radius:6px;padding:3px 10px;font-size:10px;cursor:pointer;color:var(--pm);font-weight:600;transition:all .15s}
.demo-fill:hover{background:var(--pl);border-color:var(--pm)}
</style>
</head>
<body>
<div class="login-card">
  <div class="logo">
    <div class="logo-icon">🛡️</div>
    <h1>Agentic IAM v3.0</h1>
    <p>Copilota Operativo — Team IAM</p>
  </div>

  <div class="error-msg" id="error-msg"></div>

  <form onsubmit="doLogin(event)">
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="Inserisci username" autocomplete="username" required>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Inserisci password" autocomplete="current-password" required>
    </div>
    <button type="submit" class="login-btn" id="login-btn">Accedi</button>
  </form>

  <div class="demo-hint">
    <h3>Account demo disponibili</h3>
    <div class="demo-user">
      <span class="demo-user-name">admin</span>
      <span class="demo-user-role role-admin">Admin</span>
      <button class="demo-fill" onclick="fill('admin','admin123')">Usa</button>
    </div>
    <div class="demo-user">
      <span class="demo-user-name">operatore</span>
      <span class="demo-user-role role-operatore">Operatore</span>
      <button class="demo-fill" onclick="fill('operatore','operatore123')">Usa</button>
    </div>
    <div class="demo-user">
      <span class="demo-user-name">auditor</span>
      <span class="demo-user-role role-auditor">Auditor</span>
      <button class="demo-fill" onclick="fill('auditor','auditor123')">Usa</button>
    </div>
  </div>
</div>

<script>
function fill(user, pass) {
  document.getElementById('username').value = user;
  document.getElementById('password').value = pass;
}

async function doLogin(e) {
  e.preventDefault();
  var btn = document.getElementById('login-btn');
  var errEl = document.getElementById('error-msg');
  btn.disabled = true;
  btn.textContent = 'Accesso in corso...';
  errEl.style.display = 'none';

  try {
    var r = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('username').value,
        password: document.getElementById('password').value
      })
    });
    var data = await r.json();
    if (!r.ok || !data.token) {
      errEl.textContent = data.error || 'Credenziali non valide';
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Accedi';
      return;
    }
    localStorage.setItem('iam_token', data.token);
    localStorage.setItem('iam_operator', JSON.stringify(data.operator));
    window.location.href = '/';
  } catch (err) {
    errEl.textContent = 'Errore di connessione al server';
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Accedi';
  }
}

// Se già loggato, redirect
if (localStorage.getItem('iam_token')) {
  fetch('/api/auth/validate', {
    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('iam_token') }
  }).then(r => r.json()).then(d => {
    if (d.valid) window.location.href = '/';
  }).catch(() => {});
}
</script>
</body>
</html>
